services:
  postgres:
    image: postgres:16
    env_file:
      - ../env/.env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler}
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
    volumes:
      - ../migrations/postgres:/migrations:ro

  redis:
    image: redis:7

  mongo:
    image: mongo:7

  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    depends_on:
      - iam-service
      - project-service
      - spider-service
      - execution-service
      - node-service
      - datasource-service
      - scheduler-service
      - monitor-service
    env_file:
      - ../env/.env.example
    ports:
      - "8080:8080"

  iam-service:
    build:
      context: ../..
      dockerfile: apps/iam-service/Dockerfile
    depends_on:
      - postgres
    env_file:
      - ../env/.env.example
    environment:
      IAM_ENABLE_SEED_ADMIN: "true"

  project-service:
    build:
      context: ../..
      dockerfile: apps/project-service/Dockerfile
    depends_on:
      - postgres
    env_file:
      - ../env/.env.example

  spider-service:
    build:
      context: ../..
      dockerfile: apps/spider-service/Dockerfile
    depends_on:
      - postgres
    env_file:
      - ../env/.env.example

  execution-service:
    build:
      context: ../..
      dockerfile: apps/execution-service/Dockerfile
    depends_on:
      - postgres
      - redis
      - mongo
    env_file:
      - ../env/.env.example

  node-service:
    build:
      context: ../..
      dockerfile: apps/node-service/Dockerfile
    depends_on:
      - redis
    env_file:
      - ../env/.env.example

  datasource-service:
    build:
      context: ../..
      dockerfile: apps/datasource-service/Dockerfile
    depends_on:
      - postgres
      - redis
      - mongo
    env_file:
      - ../env/.env.example

  scheduler-service:
    build:
      context: ../..
      dockerfile: apps/scheduler-service/Dockerfile
    depends_on:
      - postgres
      - execution-service
    env_file:
      - ../env/.env.example
    environment:
      EXECUTION_SERVICE_URL: ${EXECUTION_SERVICE_URL:-http://execution-service:8085}

  monitor-service:
    build:
      context: ../..
      dockerfile: apps/monitor-service/Dockerfile

  agent:
    build:
      context: ../..
      dockerfile: apps/agent/Dockerfile
    depends_on:
      - node-service
      - execution-service
    env_file:
      - ../env/.env.example
    environment:
      NODE_SERVICE_URL: http://node-service:8084
      EXECUTION_SERVICE_URL: ${EXECUTION_SERVICE_URL:-http://execution-service:8085}
      NODE_NAME: mvp-node
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    depends_on:
      - gateway
    ports:
      - "3000:80"
