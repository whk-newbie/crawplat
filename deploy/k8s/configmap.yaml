apiVersion: v1
kind: ConfigMap
metadata:
  name: crawler-platform-config
  namespace: crawler-platform
data:
  HTTP_ADDR: ":8080"
  POSTGRES_DSN: "postgres://crawler:crawler@postgres:5432/crawler?sslmode=disable"
  REDIS_ADDR: "redis:6379"
  MONGO_URI: "mongodb://mongo:27017"
  JWT_SECRET: "change-me"
  INTERNAL_API_TOKEN: "change-me"
  EXECUTION_SERVICE_URL: "http://execution-service:8085"
  NODE_SERVICE_URL: "http://node-service:8084"
  NODE_NAME: "mvp-node"
  POLL_INTERVAL: "5s"
  AGENT_CAPABILITIES: "docker"
  IAM_ENABLE_SEED_ADMIN: "true"
