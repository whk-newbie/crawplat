apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: crawler-platform
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: crawler-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: crawler-platform/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: crawler-platform-config
          resources:
            limits: { cpu: 500m, memory: 128Mi }
            requests: { cpu: 100m, memory: 64Mi }

